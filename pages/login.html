<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vibe & Study</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        .login-card { max-width: 350px; margin: 60px auto; background: rgba(255,255,255,0.7); border-radius: 16px; box-shadow: 0 2px 16px #0002; padding: 32px 24px; }
        .login-card h2 { margin-bottom: 18px; }
        .login-card input { width: 100%; margin-bottom: 16px; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
        .login-card button { width: 100%; padding: 10px; border-radius: 6px; background: #7ad7f0; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome to Vibe & Study</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script src="../assets/app.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            if (!name || !email) return alert('Please enter both name and email.');
            
            // Simulate Gmail login - if email ends with @gmail.com, use it as Gmail name
            const isGmail = email.toLowerCase().endsWith('@gmail.com');
            const userData = {
                name: name,
                email: email,
                isGmail: isGmail,
                gmailName: isGmail ? email.split('@')[0] : null,
                profilePic: null // Would be set by actual Gmail API
            };
            
            localStorage.setItem('vibeUser', JSON.stringify(userData));
            window.location.href = 'home.html';
        };
    </script>
</body>
</html>
